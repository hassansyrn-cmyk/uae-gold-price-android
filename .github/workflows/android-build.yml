name: Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude-redesign

jobs:
  build:
    name: Build and Sign AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK 36 and Build Tools 36.0.0
        run: |
          SDK_MANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDK_MANAGER" ]; then
            SDK_MANAGER="sdkmanager"
          fi
          yes | $SDK_MANAGER --licenses || true
          $SDK_MANAGER "platforms;android-36" "build-tools;36.0.0"

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Error: KEYSTORE_BASE64 is empty or not set."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > release.jks

      - name: Build Release AAB and Debug APK
        env:
          KEYSTORE_FILE: "release.jks"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew clean assembleDebug bundleRelease

      - name: Clean up temporary keystore
        if: always()
        run: rm -f release.jks

      - name: Display Filename and Build Result
        run: |
          echo "### Build Result :white_check_mark:" >> $GITHUB_STEP_SUMMARY
          echo "Successfully built and signed Release AAB!" >> $GITHUB_STEP_SUMMARY
          echo "#### Artifact Details:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh app/build/outputs/bundle/release/ >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "Build result files:"
          ls -la app/build/outputs/bundle/release/

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Signed Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/*.aab
