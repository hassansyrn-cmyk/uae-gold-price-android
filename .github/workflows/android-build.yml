name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Signed AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build release AAB unsigned
        run: ./gradlew clean bundleRelease

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > afaq-upload-key.jks

      - name: Copy unsigned AAB
        run: |
          mkdir -p signed-output
          cp app/build/outputs/bundle/release/app-release.aab signed-output/afaq-release-signed.aab

      - name: Sign AAB
        run: |
          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore afaq-upload-key.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            signed-output/afaq-release-signed.aab \
            "${{ secrets.KEY_ALIAS }}"

      - name: Verify signed AAB
        run: |
          jarsigner -verify -verbose -certs signed-output/afaq-release-signed.aab

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: afaq-release-aab-signed
          path: signed-output/afaq-release-signed.aab

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: afaq-debug-apk
          path: app/build/outputs/apk/debug/*.apk
